name: Build StockIQ APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Install dependencies
        run: |
          npm install
          npm install -D typescript

      - name: Build web app
        env:
          VITE_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Copy network security config
        run: |
          mkdir -p android/app/src/main/res/xml
          cp network_security_config.xml android/app/src/main/res/xml/

      - name: Add internet permission to AndroidManifest
        run: |
          sed -i 's/<manifest/<manifest/' android/app/src/main/AndroidManifest.xml
          grep -q 'INTERNET' android/app/src/main/AndroidManifest.xml || \
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/' android/app/src/main/AndroidManifest.xml

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: StockIQ-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
